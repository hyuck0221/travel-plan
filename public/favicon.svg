<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 둥근 배경 (Modern Rounded Background) -->
  <rect width="48" height="48" rx="14" fill="url(#bg-grad)"/>
  
  <!-- 심플한 경로선 (Simple Path) — 핀 하단과 자연스럽게 연결되는 느낌 -->
  <path d="M10 32 Q 24 42, 38 32" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-dasharray="1, 5" opacity="0.5" />
  
  <!-- 메인 핀 (Minimalist Pin) -->
  <path d="M24 8 C 17.5 8, 13 12.5, 13 19 C 13 26, 24 36, 24 36 C 24 36, 35 26, 35 19 C 35 12.5, 30.5 8, 24 8 Z" fill="white" />
  
  <!-- 핀 내부 포인트 (Inner Dot) -->
